name: Build Native Miner

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: rpow-miner-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            artifact: rpow-miner-windows-x64.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: rpow-miner-macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary
        shell: bash
        run: |
          mkdir -p release/
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/rpow-miner.exe release/${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/rpow-miner release/${{ matrix.artifact }}
            chmod +x release/${{ matrix.artifact }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download linux binary
        uses: actions/download-artifact@v4
        with:
          name: rpow-miner-linux-x64
          path: dist/

      - name: Download windows binary
        uses: actions/download-artifact@v4
        with:
          name: rpow-miner-windows-x64.exe
          path: dist/

      - name: Download macos binary
        uses: actions/download-artifact@v4
        with:
          name: rpow-miner-macos-arm64
          path: dist/

      - name: List files
        run: ls -lhR dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/rpow-miner-linux-x64
            dist/rpow-miner-windows-x64.exe
            dist/rpow-miner-macos-arm64
          generate_release_notes: true
