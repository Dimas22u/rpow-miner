name: Build Native Miner

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: rpow-miner-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            artifact: rpow-miner-windows-x64.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: rpow-miner-macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/rpow-miner.exe bin/${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/rpow-miner bin/${{ matrix.artifact }}
            chmod +x bin/${{ matrix.artifact }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bin/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: bin/

      - name: Move binaries
        run: |
          mkdir -p bin/
          mv bin/rpow-miner-linux-x64/rpow-miner-linux-x64 bin/
          mv bin/rpow-miner-windows-x64.exe/rpow-miner-windows-x64.exe bin/
          mv bin/rpow-miner-macos-arm64/rpow-miner-macos-arm64 bin/
          chmod +x bin/rpow-miner-*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/rpow-miner-linux-x64
            bin/rpow-miner-windows-x64.exe
            bin/rpow-miner-macos-arm64
          generate_release_notes: true
